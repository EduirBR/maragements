services:
  mongo:
    image: mongo:7
    container_name: maragements-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-admin}
      MONGO_INITDB_DATABASE: ${DB_NAME:-maragements}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: maragements-backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      DB_HOST: mongo
      DB_PORT: "27017"
      DB_ROOT_USER: ${DB_ROOT_USER:-admin}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-admin}
      DB_NAME: ${DB_NAME:-maragements}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-2h}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BASEURL: ""
    container_name: maragements-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  mongo_data:
